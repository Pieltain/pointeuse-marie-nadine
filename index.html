<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pointeuse MC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="topbar">
        <button class="admin-link" onclick="ouvrirAdmin()">⚙️ Admin</button>
        <div class="version">v2.2</div>
      </div>

      <h1>POINTEUSE MC</h1>
      <div class="clock" id="horloge">--:--:--</div>

      <div class="employee-box">
        <label for="employeSelect" class="label">Employé</label>
        <select id="employeSelect" class="select" onchange="chargerEtat()">
          <option>Chargement...</option>
        </select>
      </div>

      <button id="btnArrivee" class="btn arrivee" onclick="pointer('Arrivée')">ARRIVÉE</button>
      <button id="btnDepart" class="btn depart" onclick="pointer('Départ')">DÉPART</button>

      <div id="message" class="message">Chargement...</div>

      <div class="last-card">
        <div class="last-title">Dernier pointage</div>
        <div id="dernier" class="dernier">—</div>
      </div>
    </section>
  </main>

  <div id="adminModal" class="modal hidden">
    <div class="modal-content">
      <button class="close" onclick="fermerAdmin()">×</button>
      <h2>Administration</h2>

      <div id="adminLogin">
        <label class="label">Mot de passe admin</label>
        <input id="adminPassword" class="input" type="password" inputmode="numeric" placeholder="Mot de passe">
        <button class="btn-small" onclick="connexionAdmin()">Se connecter</button>
      </div>

      <div id="adminPanel" class="hidden">
        <h3>Ajouter un employé</h3>

        <label class="label">Nom</label>
        <input id="newNom" class="input" type="text" placeholder="Nom de l'employé">

        <label class="label">PIN</label>
        <input id="newPin" class="input" type="text" inputmode="numeric" maxlength="6" placeholder="Ex : 1234">

        <label class="checkline">
          <input id="newActif" type="checkbox" checked>
          Actif
        </label>

        <label class="checkline">
          <input id="newAdmin" type="checkbox">
          Administrateur
        </label>

        <button class="btn-small" onclick="ajouterEmploye()">Ajouter l'employé</button>

        <div id="adminMessage" class="admin-message"></div>

        <h3>Employés actifs</h3>
        <div id="listeEmployes" class="liste-employes">Chargement...</div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
