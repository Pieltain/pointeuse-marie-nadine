<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pointeuse MC</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="version">v2.0</div>
      <h1>POINTEUSE MC</h1>
      <div class="clock" id="horloge">--:--:--</div>

      <label for="employeSelect" class="label">Employé</label>
      <select id="employeSelect" class="select" onchange="chargerEtat()">
        <option>Chargement...</option>
      </select>

      <button id="btnArrivee" class="btn arrivee" onclick="pointer('Arrivée')">ARRIVÉE</button>
      <button id="btnDepart" class="btn depart" onclick="pointer('Départ')">DÉPART</button>

      <div id="message" class="message">Chargement...</div>

      <div class="last-card">
        <div class="last-title">Dernier pointage</div>
        <div id="dernier" class="dernier">—</div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
